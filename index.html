<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You 💌</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f3e7d9, #e3eeff);
    font-family: 'Georgia', serif;
}

/* Container */
.container {
    position: relative;
    width: 600px;
    height: 420px;
    perspective: 1200px;
}

/* Envelope base */
.envelope {
    position: relative;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f0d2b0;
    border: 2px solid #c8a57b;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    z-index: 2;
}

/* Side folds */
.left-fold, .right-fold {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: #e8c49f;
    z-index: 1;
}

.left-fold {
    left: 0;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.right-fold {
    right: 0;
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

/* Top flap */
.flap {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #e5bf96;
    top: 0;
    left: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 4;
    border-top: 2px solid #c8a57b;
}

/* Wax seal */
.seal {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #b22222;
    border-radius: 50%;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
}

/* Letter */
.letter {
    position: absolute;
    width: 85%;
    height: 90%;
    background: #fffef8;
    left: 7.5%;
    bottom: 0;
    padding: 40px;
    box-sizing: border-box;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    transform: translateY(0);
    transition: transform 1s ease;
    z-index: 1;
}

/* Photo */
.letter img {
    width: 150px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

/* Open state */
.open .flap {
    transform: rotateX(-180deg);
}

.open .letter {
    transform: translateY(-250px);
    z-index: 10;
}

.open .seal {
    opacity: 0;
    transition: opacity 0.4s ease;
}

h1 {
    margin-top: 0;
    font-size: 28px;
}

p {
    font-size: 16px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope">
        <div class="base"></div>
        <div class="left-fold"></div>
        <div class="right-fold"></div>
        <div class="flap"></div>
        <div class="seal" onclick="openLetter()">💌</div>

        <div class="letter">
            <img src="gabs.png" alt="Her photo">
            <h1>Happy Birthday 🎉</h1>
            <p>
                I wanted to give you something a little different this year.<br><br>
                I hope this year brings you happiness,
                growth, and unforgettable memories.<br><br>
                You deserve a year that feels special — just like you are.
            </p>
            <p>— From someone who appreciates you 💙</p>
        </div>
    </div>
</div>

<script>
function openLetter() {
    document.querySelector('.container').classList.toggle('open');
}
</script>

</body>
</html>
