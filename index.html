<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #fdf6ec 0%, #e6ecff 70%);
    font-family: 'Playfair Display', serif;
}

/* Container */
.container {
    position: relative;
    width: 90vw;
    max-width: 600px;
    aspect-ratio: 3 / 2;
    perspective: 1000px;
}

/* Envelope */
.envelope {
    position: relative;
    width: 100%;
    height: 100%;
}

/* Base */
.base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f0d2b0;
    border: 2px solid #c8a57b;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    z-index: 3;
}

/* Side folds */
.left-fold, .right-fold {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: #e8c49f;
    z-index: 2;
}

.left-fold {
    left: 0;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.right-fold {
    right: 0;
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

/* Flap */
.flap {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #e5bf96;
    top: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 0.7s ease;
    z-index: 4;
}

/* Seal */
.seal {
    position: absolute;
    width: 50px;
    height: 50px;
    background: #b22222;
    border-radius: 50%;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: white;
}

/* Letter */
.letter {
    position: absolute;
    width: 85%;
    background: #fffef8;
    left: 7.5%;
    top: 100%; /* start hidden fully below */
    padding: 5%;
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transition: top 0.8s ease;
    z-index: 1;
    text-align: center;
}

/* Image */
.letter img {
    width: 35%;
    max-width: 130px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* Text */
.to-from {
    text-align: left;
    font-size: 14px;
    margin-bottom: 10px;
    font-family: 'Dancing Script', cursive;
}

.signature {
    margin-top: 10px;
    font-family: 'Dancing Script', cursive;
    font-size: 18px;
}

h1 {
    font-size: clamp(20px, 4vw, 28px);
}

p {
    font-size: clamp(13px, 3.5vw, 16px);
}

/* Open state */
.open .flap {
    transform: rotateX(-180deg);
}

.open .letter {
    top: 10%; /* only rise slightly into view */
    z-index: 6;
}

.open .seal {
    opacity: 0;
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope">
        <div class="base"></div>
        <div class="left-fold"></div>
        <div class="right-fold"></div>
        <div class="flap"></div>
        <div class="seal" onclick="openLetter()">💌</div>

        <div class="letter">
            <div class="to-from">
                To: Gabs <br>
                From: Anthony
            </div>

            <img src="gabs.png" alt="Her photo">

            <h1>Happy Birthday 🎉</h1>

            <p>
               hii gabs, I hope you enjoy your birthday, thanks for being such an awesome person, keep being you, and I wish you the best<br><br>
               
            </p>

            <div class="signature">
                With appreciation,<br>
                Anthony 💙
            </div>
        </div>
    </div>
</div>

<script>
function openLetter() {
    document.querySelector('.container').classList.toggle('open');
}
</script>

</body>
</html>
