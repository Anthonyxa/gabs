<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #fdf6ec 0%, #e6ecff 70%);
    font-family: 'Playfair Display', serif;
    overflow: hidden;
}

/* Soft animated background texture */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 35px 35px;
    animation: float 80s linear infinite;
    opacity: 0.3;
}

@keyframes float {
    from { transform: translate(0,0); }
    to { transform: translate(-150px,-150px); }
}

.container {
    position: relative;
    width: 600px;
    height: 420px;
    perspective: 1200px;
}

/* Envelope */
.envelope {
    position: relative;
    width: 100%;
    height: 100%;
}

.base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f0d2b0;
    border: 2px solid #c8a57b;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    z-index: 2;
}

.left-fold, .right-fold {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: #e8c49f;
    z-index: 1;
}

.left-fold {
    left: 0;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.right-fold {
    right: 0;
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

.flap {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #e5bf96;
    top: 0;
    left: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 4;
    border-top: 2px solid #c8a57b;
}

.seal {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #b22222;
    border-radius: 50%;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: pointer;
}

/* Letter */
.letter {
    position: absolute;
    width: 85%;
    height: 80%;
    background: #fffef8;
    left: 7.5%;
    bottom: 0;
    padding: 30px;
    box-sizing: border-box;
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transform: translateY(0);
    transition: transform 1s ease;
    z-index: 1;
    text-align: center;
    overflow: hidden;
}

/* Photo */
.letter img {
    width: 120px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

/* To/From */
.to-from {
    text-align: left;
    font-size: 16px;
    margin-bottom: 15px;
    font-family: 'Dancing Script', cursive;
}

.signature {
    margin-top: 15px;
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
}

/* Open state */
.open .flap {
    transform: rotateX(-180deg);
}

.open .letter {
    transform: translateY(-160px); /* reduced so it stays aligned */
    z-index: 10;
}

.open .seal {
    opacity: 0;
    transition: opacity 0.4s ease;
}

h1 {
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope">
        <div class="base"></div>
        <div class="left-fold"></div>
        <div class="right-fold"></div>
        <div class="flap"></div>
        <div class="seal" onclick="openLetter()">💌</div>

        <div class="letter">
            <div class="to-from">
                To: Gabs <br>
                From: Anthony
            </div>

            <img src="gabs.png" alt="Her photo">

            <h1>Happy Birthday 🎉</h1>

            <p>
                hii gabs, I hope you enjoy your birthday, thanks for being such an awesome person, keep being you, and I wish you the best<br><br>
            
            </p>

            <div class="signature">
                With appreciation,<br>
                Anthony 💙
            </div>
        </div>
    </div>
</div>

<script>
function openLetter() {
    document.querySelector('.container').classList.toggle('open');
}
</script>

</body>
</html>
