<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f8e1f4, #e1f0ff);
    font-family: Georgia, serif;
}

.container {
    position: relative;
    width: 500px;
    height: 350px;
    cursor: pointer;
}

.envelope {
    position: relative;
    width: 100%;
    height: 100%;
}

.base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f5d6b4;
    border: 2px solid #c9a67a;
    box-sizing: border-box;
}

.flap {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #eac29d;
    top: 0;
    left: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
    border-top: 2px solid #c9a67a;
}

.letter {
    position: absolute;
    width: 85%;
    height: 80%;
    background: white;
    left: 7.5%;
    top: 10%;
    padding: 30px;
    box-sizing: border-box;
    text-align: center;
    transform: translateY(0);
    transition: transform 0.8s ease;
    z-index: -1;
    border-radius: 6px;
}

.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    transform: translateY(-160px);
}

h1 {
    margin-top: 0;
}
</style>
</head>

<body>

<div class="container" onclick="toggleEnvelope()">
    <div class="envelope">
        <div class="base"></div>
        <div class="flap"></div>
        <div class="letter">
            <h1>Happy Birthday 🎉</h1>
            <p>
                I wanted to give you something a little different.<br><br>
                I hope this year brings you growth, happiness,
                and moments that feel unforgettable.<br><br>
                You deserve a beautiful year.
            </p>
            <p>— From someone who truly appreciates you 💙</p>
        </div>
    </div>
</div>

<script>
function toggleEnvelope() {
    document.querySelector('.container').classList.toggle('open');
}
</script>

</body>
</html>
